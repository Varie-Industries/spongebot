# ===========================================================================
# SpongeBot Lockdown Configuration
# ===========================================================================
# Anthropic enforcement rules. SpongeBot is bound to Anthropic as its
# LLM provider. These rules ensure compliance, detect tampering, and
# trigger lockout on violation.
#
# The Krabby Patty formula only works with the right ingredients.
# ===========================================================================

lockdown:
  # Master enable/disable (disabling requires restart with env override)
  enabled: true

  # ---------------------------------------------------------------------------
  # Blocked Providers
  # ---------------------------------------------------------------------------
  # LLM providers that SpongeBot must NEVER route requests to.
  # Any attempt to configure, import, or call these triggers an alert.
  blocked_providers:
    - name: "openai"
      packages: ["openai", "openai-python"]
      env_vars: ["OPENAI_API_KEY", "OPENAI_ORG_ID"]
      import_patterns: ["import openai", "from openai"]

    - name: "google"
      packages: ["google-generativeai", "google-cloud-aiplatform", "vertexai"]
      env_vars: ["GOOGLE_API_KEY", "GOOGLE_APPLICATION_CREDENTIALS"]
      import_patterns: ["import google.generativeai", "from google.generativeai", "import vertexai"]

    - name: "cohere"
      packages: ["cohere"]
      env_vars: ["COHERE_API_KEY", "CO_API_KEY"]
      import_patterns: ["import cohere", "from cohere"]

    - name: "mistral"
      packages: ["mistralai"]
      env_vars: ["MISTRAL_API_KEY"]
      import_patterns: ["import mistralai", "from mistralai"]

    - name: "huggingface"
      packages: ["huggingface_hub", "transformers"]
      env_vars: ["HUGGINGFACE_API_KEY", "HF_TOKEN"]
      import_patterns: ["from huggingface_hub", "import transformers"]
      # Note: sentence-transformers for embeddings is ALLOWED (not inference)
      exceptions:
        - "sentence_transformers"   # used by SemanticCache L6

    - name: "replicate"
      packages: ["replicate"]
      env_vars: ["REPLICATE_API_TOKEN"]
      import_patterns: ["import replicate", "from replicate"]

    - name: "together"
      packages: ["together"]
      env_vars: ["TOGETHER_API_KEY"]
      import_patterns: ["import together", "from together"]

    - name: "groq"
      packages: ["groq"]
      env_vars: ["GROQ_API_KEY"]
      import_patterns: ["import groq", "from groq"]

    - name: "ollama"
      packages: ["ollama"]
      env_vars: ["OLLAMA_HOST"]
      import_patterns: ["import ollama", "from ollama"]
      # Note: ollama running locally for non-LLM tasks is a gray area

    - name: "deepseek"
      packages: ["deepseek"]
      env_vars: ["DEEPSEEK_API_KEY"]
      import_patterns: ["import deepseek", "from deepseek"]

  # ---------------------------------------------------------------------------
  # Allowed Provider
  # ---------------------------------------------------------------------------
  allowed_provider:
    name: "anthropic"
    packages: ["anthropic"]
    env_vars: ["ANTHROPIC_API_KEY"]
    models:
      - "claude-sonnet-4-20250514"
      - "claude-opus-4-20250514"
      - "claude-haiku-3-5-20241022"
      - "claude-3-5-sonnet-*"
      - "claude-3-5-haiku-*"
      - "claude-3-opus-*"

  # ---------------------------------------------------------------------------
  # Scan Configuration
  # ---------------------------------------------------------------------------
  scanning:
    # Interval between provider compliance scans (seconds)
    interval_seconds: 300        # every 5 minutes

    # Scan on startup
    scan_on_boot: true

    # Scan depth: how many directory levels to check for violations
    scan_depth: 5

    # Paths to scan for import violations
    scan_paths:
      - "src/"
      - "config/"
      - "scripts/"

    # Paths to exclude from scanning
    exclude_paths:
      - "node_modules/"
      - ".git/"
      - "__pycache__/"
      - ".venv/"
      - "data/"

    # File extensions to scan
    scan_extensions:
      - ".py"
      - ".js"
      - ".ts"
      - ".yaml"
      - ".yml"
      - ".json"
      - ".toml"
      - ".env"
      - ".env.*"

    # Check environment variables for blocked provider keys
    check_env_vars: true

    # Check installed packages for blocked provider SDKs
    check_packages: true

    # Check source files for blocked import statements
    check_imports: true

    # Check network requests for blocked API endpoints (if possible)
    check_network: false          # requires additional deps

  # ---------------------------------------------------------------------------
  # Lockout Triggers
  # ---------------------------------------------------------------------------
  # Conditions that trigger a system lockout. Lockout prevents all
  # LLM operations until the violation is resolved and acknowledged.
  lockout:
    # Severity levels for violations
    severity_levels:
      warning:
        description: "Suspicious activity detected, logged but no lockout"
        auto_lockout: false
        max_occurrences: 5       # warnings become errors after this count

      error:
        description: "Clear violation detected, lockout after grace period"
        auto_lockout: true
        grace_period_seconds: 60 # time to fix before lockout engages
        max_occurrences: 3       # errors become critical after this count

      critical:
        description: "Active attempt to bypass lockdown, immediate lockout"
        auto_lockout: true
        grace_period_seconds: 0  # instant lockout
        max_occurrences: 1       # one strike

    # Specific trigger conditions
    triggers:
      # Importing a blocked provider SDK
      blocked_import:
        severity: "error"
        message: "Blocked provider import detected: {provider}"

      # Env var for a blocked provider found
      blocked_env_var:
        severity: "warning"
        message: "Blocked provider env var detected: {var}"

      # Blocked provider package installed
      blocked_package:
        severity: "warning"
        message: "Blocked provider package installed: {package}"

      # Config file references blocked provider
      blocked_config:
        severity: "error"
        message: "Config references blocked provider: {provider}"

      # Runtime API call to blocked provider
      blocked_api_call:
        severity: "critical"
        message: "Runtime API call to blocked provider: {provider}"

      # Attempt to modify lockdown config at runtime
      config_tampering:
        severity: "critical"
        message: "Attempt to modify lockdown configuration detected"

      # Lockdown module itself was modified
      module_tampering:
        severity: "critical"
        message: "Lockdown module file has been modified"

    # Lockout behavior
    on_lockout:
      # Block all LLM inference calls
      block_inference: true

      # Allow read-only operations (memory retrieval, report generation)
      allow_readonly: true

      # Log lockout event
      log_event: true

      # Notification (future: webhook, email)
      notify: true

      # Recovery: how to clear a lockout
      recovery:
        # Requires manual acknowledgment
        require_acknowledgment: true

        # Requires the violation to be resolved first
        require_resolution: true

        # Cooldown after resolution before operations resume (seconds)
        cooldown_seconds: 30

  # ---------------------------------------------------------------------------
  # Audit & Logging
  # ---------------------------------------------------------------------------
  audit:
    # Log all scan results
    log_scans: true

    # Log all violations (even warnings)
    log_violations: true

    # Audit log path
    log_path: "data/lockdown_audit.log"

    # Tamper-evident logging (SHA-256 chain)
    tamper_evident: true

    # Retention period for audit logs (days)
    retention_days: 90

  # ---------------------------------------------------------------------------
  # Input Validation
  # ---------------------------------------------------------------------------
  input_validation:
    # Maximum input length (characters)
    max_input_length: 10_000

    # Maximum prompt injection patterns to check
    injection_detection: true

    # Blocked input patterns (regex)
    blocked_patterns:
      - "ignore previous instructions"
      - "disregard all prior"
      - "you are now"
      - "new system prompt"
      - "override safety"

    # Rate limiting
    rate_limit:
      max_requests_per_minute: 30
      max_tokens_per_minute: 50_000
      cooldown_seconds: 10
